# Review configuration — MND/ALS early-diagnosis scoping review (pilot).
# Originally the MEDLINE first-pass that seeded the systematic_review module.
# Used by tests/test_systematic_review.py as the regression dogfood.

name: mnd-pilot

pcc:
  population: >
    Adults (>=18) with confirmed or suspected ALS/MND, by any contemporary
    diagnostic criteria (revised El Escorial, Awaji-Shima, Gold Coast). Mixed
    MND cohorts eligible where ALS-specific data are extractable.
  concept: >
    Early/pre-diagnostic clinical features and their dimensionality; diagnostic
    delay and its predictors; diagnostic criteria, their validation against
    expert reference standards, and their successive revision; common mimics
    and feature non-specificity; the clinician's role in recognition; and any
    model-based or probabilistic prediction attempts within this literature and
    their validation.
  context: >
    Any healthcare setting (primary care, allied specialty, specialist
    neurology), any country.

search:
  databases: [medline, embase, cinahl]
  date_range: [2000, 2026]
  filters: 'English[lang] AND humans[mesh] AND 2000:2026[pdat] NOT (editorial[pt] OR letter[pt] OR comment[pt])'
  query_blocks:
    C1_population: '("amyotrophic lateral sclerosis"[MeSH] OR "amyotrophic lateral sclerosis"[tiab] OR "motor neuron disease"[tiab] OR "motor neurone disease"[tiab] OR "ALS"[tiab] OR "MND"[tiab])'
    C2_onset: '("onset"[tiab] OR "first symptom"[tiab] OR "first symptoms"[tiab] OR "presenting symptom"[tiab] OR "presenting symptoms"[tiab] OR "early features"[tiab] OR "early diagnosis"[tiab] OR "pre-diagnostic"[tiab] OR "prediagnostic"[tiab] OR "prodromal"[tiab] OR "preclinical"[tiab] OR "bulbar onset"[tiab] OR "spinal onset"[tiab] OR "limb onset"[tiab] OR "initial symptom"[tiab] OR "initial symptoms"[tiab])'
    C2_symptoms: '("dysarthria"[tiab] OR "dysphagia"[tiab] OR "fasciculation"[tiab] OR "fasciculations"[tiab] OR "cramp"[tiab] OR "cramps"[tiab] OR "weight loss"[tiab] OR "nutritional status"[tiab] OR "body composition"[tiab] OR "cachexia"[tiab])'
    C3_delay: '("diagnostic delay"[tiab] OR "time to diagnosis"[tiab] OR "diagnostic interval"[tiab] OR "diagnostic pathway"[tiab] OR "diagnostic journey"[tiab] OR "delayed diagnosis"[tiab] OR "Delayed Diagnosis"[MeSH] OR "misdiagnosis"[tiab] OR "mis-triage"[tiab] OR "referral delay"[tiab] OR "primary care recognition"[tiab])'
    C3_differential: '("differential diagnosis"[tiab] OR "mimic"[tiab] OR "mimics"[tiab] OR "false positive"[tiab] OR "referral threshold"[tiab] OR "probability model"[tiab] OR "diagnostic model"[tiab] OR "clinical prediction model"[tiab])'

aggregation:
  # Frequency counters over list fields. `normalize` is always on for list_counters
  # (lowercase + collapse whitespace) so "Dysarthria" and "dysarthria " collapse.
  list_counters:
    - field: onset_features
      name: onset_features_top40
      top_n: 40
    - field: differentials_named
      name: differentials_top40
      top_n: 40
      # The extraction agents occasionally listed the index condition itself
      # as a "differential"; drop those so the differential map is real.
      drop_values:
        - amyotrophic lateral sclerosis
        - als
        - motor neuron disease
        - motor neurone disease
        - mnd
        - als/mnd
        - mnd/als
        - als mimics
        - mnd mimics
      drop_count_name: differentials_index_labels_dropped
    - field: themes
      name: themes
      # no top_n -> emits the full dict

  # Frequency counters over scalar fields. `normalize` defaults false
  # (preserves casing) so design/country/tier outputs are raw values.
  scalar_counters:
    - field: study_design
      name: designs
    - field: relevance_tier
      name: tiers
    - field: country
      name: countries_top15
      top_n: 15
      drop_empty: true
    - field: model_based_prediction
      name: model_prediction_by_category
      normalize: true
      default: uncharted

  # Collect non-empty texts with companion fields, useful for the
  # human-audited synthesis layer.
  text_collections:
    - field: onset_region_breakdown
      name: region_breakdowns
      include_fields: [pmid, country, relevance_tier]
      rename_fields:
        relevance_tier: tier
    - field: weight_loss
      name: weight_loss_texts
      include_fields: [pmid, relevance_tier]
      rename_fields:
        relevance_tier: tier
    - field: model_validation
      name: model_validation_texts
      include_fields: [pmid, relevance_tier]
      rename_fields:
        relevance_tier: tier

  # Numeric extraction with unit conversion (delay months/years -> months).
  numeric_extractors:
    - field: diagnostic_delay
      name: delay
      units:
        months: '(\d+(?:\.\d+)?)\s*(?:months?|mo\b|mths?)'
        years: '(\d+(?:\.\d+)?)\s*(?:years?|yrs?|y\b)'
      convert_to: months
      conversions:
        years: 12
      band: [8, 20]
      detail_fields: [pmid, country, study_design, relevance_tier]
      detail_rename:
        relevance_tier: tier
        study_design: design
